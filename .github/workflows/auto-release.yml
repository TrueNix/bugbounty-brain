name: Auto-release public brain

# Publishes a new "latest" release whenever reviewed knowledge cards land on the
# default branch, so consumers that track releases/latest (e.g. bugbounty-ctf's
# BrainStore) pick up merged knowledge without a manual tag. Manual v* tagging via
# release.yml still works and is unaffected. GITHUB_TOKEN creates the release and
# tag directly; it does not rely on a tag push triggering another workflow.

on:
  push:
    branches:
      - main
    paths:
      - knowledge/cards.jsonl
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish latest release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Validate canonical cards
        run: |
          set -euo pipefail
          bugbounty-brain validate

      - name: Compile release artifacts
        run: |
          set -euo pipefail
          bugbounty-brain compile

      - name: Verify manifest database checksum
        run: |
          set -euo pipefail
          python - <<'PY'
          from hashlib import sha256
          import json
          from pathlib import Path

          database = Path("dist/reference_knowledge.db")
          manifest_path = Path("dist/brain-manifest.json")
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          if manifest.get("database_filename") != database.name:
              raise SystemExit("manifest database_filename does not match release database")
          actual = sha256(database.read_bytes()).hexdigest()
          if manifest.get("database_sha256") != actual:
              raise SystemExit("release database SHA-256 does not match manifest")
          print(f"verified database SHA-256: {actual}")
          PY

      - name: Skip when card content is unchanged since the latest release
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          new_source="$(python -c "import json; print(json.load(open('dist/brain-manifest.json'))['source_sha256'])")"
          prev_source=""
          if gh release download --pattern brain-manifest.json --dir previous-release 2>/dev/null; then
            prev_source="$(python -c "import json; print(json.load(open('previous-release/brain-manifest.json'))['source_sha256'])" 2>/dev/null || true)"
          fi
          if [ -n "${prev_source}" ] && [ "${prev_source}" = "${new_source}" ]; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            echo "Card content (source_sha256=${new_source}) matches the latest release; skipping."
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish latest release
        if: steps.guard.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="v1.$(date -u +%Y%m%d).${{ github.run_number }}"
          gh release create "${tag}" \
            dist/reference_knowledge.db \
            dist/brain-manifest.json \
            --title "${tag}" \
            --generate-notes \
            --latest
