name: Collect public knowledge

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: collect-public-knowledge-${{ github.repository }}
  cancel-in-progress: false

jobs:
  collect:
    name: Collect, validate, and propose cards
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Prepare stable automation branch
        env:
          AUTOMATION_BRANCH: automation/knowledge-collection
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            "+refs/heads/${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"
          if git ls-remote --exit-code --heads origin "${AUTOMATION_BRANCH}" >/dev/null 2>&1; then
            git fetch --no-tags origin \
              "+refs/heads/${AUTOMATION_BRANCH}:refs/remotes/origin/${AUTOMATION_BRANCH}"
            git checkout --force -B "${AUTOMATION_BRANCH}" \
              "refs/remotes/origin/${AUTOMATION_BRANCH}"
            git rebase "refs/remotes/origin/${DEFAULT_BRANCH}"
          else
            git checkout --force -B "${AUTOMATION_BRANCH}" \
              "refs/remotes/origin/${DEFAULT_BRANCH}"
          fi

      - name: Restore collector state
        id: collector-state
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .cache/collector-state.json
          key: collector-state-${{ runner.os }}-${{ github.repository_id }}-${{ github.run_id }}
          restore-keys: |
            collector-state-${{ runner.os }}-${{ github.repository_id }}-

      - name: Collect public cards
        run: |
          set -euo pipefail
          bugbounty-brain collect

      - name: Enrich collected cards
        run: |
          set -euo pipefail
          bugbounty-brain enrich

      - name: Validate canonical cards
        run: |
          set -euo pipefail
          bugbounty-brain validate

      - name: Commit card changes
        id: cards
        env:
          AUTOMATION_BRANCH: automation/knowledge-collection
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git add -- knowledge/cards.jsonl

          if ! git diff --cached --quiet; then
            staged_paths="$(git diff --cached --name-only)"
            if [[ "${staged_paths}" != "knowledge/cards.jsonl" ]]; then
              echo "refusing to commit paths other than knowledge/cards.jsonl" >&2
              exit 1
            fi
            git config user.name "bugbounty-brain automation"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: update public knowledge cards"
          fi

          base="refs/remotes/origin/${DEFAULT_BRANCH}"
          pending_paths="$(git diff --name-only "${base}...HEAD")"
          if [[ -z "${pending_paths}" ]]; then
            echo "pending=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if [[ "${pending_paths}" != "knowledge/cards.jsonl" ]]; then
            echo "automation branch contains paths other than knowledge/cards.jsonl" >&2
            exit 1
          fi

          git push --force-with-lease origin "HEAD:refs/heads/${AUTOMATION_BRANCH}"
          echo "pending=true" >> "${GITHUB_OUTPUT}"

      - name: Create or update review pull request
        if: steps.cards.outputs.pending == 'true'
        env:
          AUTOMATION_BRANCH: automation/knowledge-collection
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          title="chore: update public knowledge cards"
          body="Hourly collection from allowlisted public sources. Review provenance, attribution, sanitization, and every card before merge. This pull request is never auto-merged."
          number="$(gh pr list \
            --state open \
            --base "${DEFAULT_BRANCH}" \
            --head "${AUTOMATION_BRANCH}" \
            --json number \
            --jq '.[0].number')"
          if [[ -z "${number}" ]]; then
            gh pr create \
              --base "${DEFAULT_BRANCH}" \
              --head "${AUTOMATION_BRANCH}" \
              --title "${title}" \
              --body "${body}"
          else
            gh pr edit "${number}" --title "${title}" --body "${body}"
          fi

      - name: Save collector state
        if: success() && hashFiles('.cache/collector-state.json') != ''
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .cache/collector-state.json
          key: ${{ steps.collector-state.outputs.cache-primary-key }}
