name: Collect public knowledge

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: write

concurrency:
  group: collect-public-knowledge-${{ github.repository }}
  cancel-in-progress: false

jobs:
  collect:
    name: Collect, validate, and commit cards
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Restore collector state
        id: collector-state
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .cache/collector-state.json
          key: collector-state-${{ runner.os }}-${{ github.repository_id }}-${{ github.run_id }}
          restore-keys: |
            collector-state-${{ runner.os }}-${{ github.repository_id }}-

      - name: Restore source-health state
        id: source-health
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .cache/source-health.json
          key: source-health-${{ runner.os }}-${{ github.repository_id }}-${{ github.run_id }}
          restore-keys: |
            source-health-${{ runner.os }}-${{ github.repository_id }}-

      - name: Collect public cards
        run: |
          set -euo pipefail
          bugbounty-brain collect | tee collect-summary.json

      - name: Enrich collected cards
        run: |
          set -euo pipefail
          bugbounty-brain enrich

      - name: Validate canonical cards
        run: |
          set -euo pipefail
          bugbounty-brain validate

      - name: Report source health
        if: always() && hashFiles('collect-summary.json') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          bugbounty-brain health \
            --summary collect-summary.json \
            --health-path .cache/source-health.json \
            --threshold 3 > source-health.json || true
          cat source-health.json
          python - <<'PY'
          import json
          import os
          import pathlib

          report = json.loads(pathlib.Path("source-health.json").read_text())
          unhealthy = report.get("unhealthy", [])
          lines = ["## Source health", ""]
          if unhealthy:
              lines.append(
                  f"{len(unhealthy)} source(s) failed at least "
                  f"{report['threshold']} consecutive collection runs:"
              )
              lines.append("")
              for item in unhealthy:
                  lines.append(
                      f"- **{item['source_name']}** ({item['source_url']}) — "
                      f"{item['consecutive_failures']} consecutive failures, "
                      f"last reason `{item['last_reason']}`, "
                      f"first failed {item['first_failed_at']}"
                  )
              lines.append("")
              lines.append("Check the feed URL and format in `sources.json`.")
          else:
              failing = report.get("total_failing", 0)
              lines.append(
                  f"All sources healthy ({failing} transiently failing, "
                  f"none over threshold {report.get('threshold')})."
              )
          body = "\n".join(lines) + "\n"
          pathlib.Path("source-health-body.md").write_text(body, encoding="utf-8")
          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              with open(step_summary, "a", encoding="utf-8") as handle:
                  handle.write(body)
          pathlib.Path("unhealthy.flag").write_text("1" if unhealthy else "0")
          PY
          if [ "$(cat unhealthy.flag)" = "1" ]; then
            title="Source health: feeds failing repeatedly"
            existing="$(gh issue list --state open --search "${title} in:title" \
              --json number --jq '.[0].number' 2>/dev/null || true)"
            if [ -n "${existing:-}" ]; then
              gh issue comment "${existing}" --body-file source-health-body.md || true
            else
              gh issue create --title "${title}" --body-file source-health-body.md || true
            fi
          fi

      - name: Save source-health state
        if: always() && hashFiles('.cache/source-health.json') != ''
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .cache/source-health.json
          key: ${{ steps.source-health.outputs.cache-primary-key }}

      - name: Commit card changes to the default branch
        id: commit
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          echo "committed=false" >> "${GITHUB_OUTPUT}"
          git add -- knowledge/cards.jsonl

          if git diff --cached --quiet; then
            echo "No card changes to commit."
            exit 0
          fi

          # Only the canonical JSONL may ever be committed by automation. Refuse
          # if collection or enrichment somehow touched any other tracked path.
          staged_paths="$(git diff --cached --name-only)"
          if [[ "${staged_paths}" != "knowledge/cards.jsonl" ]]; then
            echo "refusing to commit paths other than knowledge/cards.jsonl:" >&2
            echo "${staged_paths}" >&2
            exit 1
          fi

          git config user.name "bugbounty-brain automation"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update public knowledge cards"

          # Rebase onto the latest default branch to avoid clobbering a
          # concurrent push, then push directly. Concurrency serializes runs, so
          # this stays a linear fast-forward.
          git pull --rebase --autostash origin "${DEFAULT_BRANCH}"
          git push origin "HEAD:refs/heads/${DEFAULT_BRANCH}"
          echo "committed=true" >> "${GITHUB_OUTPUT}"

      - name: Trigger auto-release
        # A push made with GITHUB_TOKEN does not trigger other workflows, so the
        # push-triggered auto-release.yml will not fire on its own. Dispatch it
        # explicitly whenever automation actually commits new cards.
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          gh workflow run auto-release.yml --ref "${DEFAULT_BRANCH}"

      - name: Save collector state
        if: success() && hashFiles('.cache/collector-state.json') != ''
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .cache/collector-state.json
          key: ${{ steps.collector-state.outputs.cache-primary-key }}
